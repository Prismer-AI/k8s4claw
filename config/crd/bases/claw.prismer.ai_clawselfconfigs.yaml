  name: clawselfconfigs.claw.prismer.ai
spec:
  group: claw.prismer.ai
  names:
    kind: ClawSelfConfig
    listKind: ClawSelfConfigList
    plural: clawselfconfigs
    singular: clawselfconfig
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.clawRef
      name: Claw
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ClawSelfConfig allows AI agents to modify their own Claw configuration.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ClawSelfConfigSpec defines the desired self-configuration
              changes.
            properties:
              addEnvVars:
                description: AddEnvVars lists environment variables to add.
