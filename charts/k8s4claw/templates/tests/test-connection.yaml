apiVersion: v1
kind: Pod
metadata:
  name: {{ include "k8s4claw.fullname" . }}-test
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s4claw.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: webhook-check
      image: busybox:1.36
      command: ["sh", "-c"]
      args:
        - "nslookup {{ include "k8s4claw.webhookServiceName" . }}.{{ .Release.Namespace }}.svc.cluster.local"
  restartPolicy: Never
