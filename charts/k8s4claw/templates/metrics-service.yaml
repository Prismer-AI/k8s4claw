{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "k8s4claw.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s4claw.labels" . | nindent 4 }}
spec:
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    {{- include "k8s4claw.selectorLabels" . | nindent 4 }}
{{- end }}
